[pytest]
# Primary pytest configuration (do not duplicate under [tool.pytest.ini_options] — pytest
# would ignore one of the two).
minversion = 7.0
testpaths =
    tests/unit
    tests/integration
norecursedirs =
    .git
    .venv
    __pycache__
    build
    dist
    *.egg-info
pythonpath =
    src
    .
addopts =
    --strict-config
    --strict-markers
    -ra
markers =
    unit: fast isolated unit tests (default testpaths).
    integration: multiple components and/or on-disk run directories.
    e2e: end-to-end or subprocess; opt-in (e.g. tests/e2e).
    slow: slower tests (e.g. matplotlib); skip with -m 'not slow'.
    live: live pipeline / dashboard stack (still CPU-only; no GPU requirement).
